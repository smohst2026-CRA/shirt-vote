<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โหวตแบบเสื้อ</title>
<style>
  :root{
    --primary:#4f46e5;
    --primary-dark:#3730a3;
    --bg:#f3f4f6;
    --card:#ffffff;
    --text:#1f2937;
    --muted:#6b7280;
    --winner:#f59e0b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI','Sarabun',sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:60px;
  }
  header{
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;
    padding:32px 16px;
    text-align:center;
  }
  header h1{margin:0 0 8px;font-size:28px;}
  header p{margin:0;opacity:.9;font-size:14px;}

  .winner-banner{
    max-width:900px;
    margin:-24px auto 24px;
    background:#fff;
    border-radius:14px;
    box-shadow:0 6px 20px rgba(0,0,0,.08);
    padding:16px 24px;
    text-align:center;
    border:2px solid var(--winner);
    font-weight:600;
    font-size:16px;
  }
  .winner-banner span{color:var(--winner);}

  .status{
    max-width:900px;
    margin:0 auto 16px;
    text-align:center;
    font-size:13px;
    color:var(--muted);
  }

  .grid{
    max-width:1100px;
    margin:0 auto;
    padding:0 16px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:20px;
  }
  .card{
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.06);
    display:flex;
    flex-direction:column;
    transition:transform .15s, box-shadow .15s;
    position:relative;
  }
  .card.leading{
    outline:3px solid var(--winner);
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.1);}
  .card .img-wrap{
    width:100%;
    aspect-ratio:1/1;
    background:#f9fafb;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .card img{width:100%;height:100%;object-fit:cover;}
  .card-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1;}
  .card-body h3{margin:0;font-size:16px;}
  .vote-btn{
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:10px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s;
  }
  .vote-btn:hover{background:var(--primary-dark);}
  .vote-btn:disabled{background:#9ca3af;cursor:not-allowed;}
  .vote-btn.voted{background:#16a34a;}

  .stats{font-size:13px;color:var(--muted);display:flex;justify-content:space-between;}
  .bar-bg{
    width:100%;
    height:10px;
    background:#e5e7eb;
    border-radius:6px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background:var(--primary);
    border-radius:6px;
    width:0%;
    transition:width .4s ease;
  }
  .leading .bar-fill{background:var(--winner);}

  .reset-wrap{
    max-width:1100px;
    margin:30px auto 0;
    padding:0 16px;
    text-align:center;
  }
  .reset-btn{
    background:#ef4444;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:10px 20px;
    font-size:13px;
    cursor:pointer;
  }
  .reset-btn:hover{background:#b91c1c;}

  .crown{
    position:absolute;
    top:8px;
    right:8px;
    background:var(--winner);
    color:#fff;
    font-size:11px;
    font-weight:700;
    padding:4px 8px;
    border-radius:6px;
  }

  .img-wrap{cursor:zoom-in;position:relative;}
  .img-wrap::after{
    content:"🔍";
    position:absolute;
    bottom:8px;
    right:8px;
    background:rgba(0,0,0,.45);
    color:#fff;
    border-radius:50%;
    width:28px;
    height:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
  }

  .lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    z-index:1000;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .lightbox.open{display:flex;}
  .lightbox img{
    max-width:100%;
    max-height:85vh;
    border-radius:8px;
    box-shadow:0 10px 40px rgba(0,0,0,.5);
  }
  .lightbox-caption{
    position:absolute;
    bottom:24px;
    left:0;
    right:0;
    text-align:center;
    color:#fff;
    font-size:15px;
    font-weight:600;
  }
  .lightbox-close{
    position:absolute;
    top:16px;
    right:20px;
    background:rgba(255,255,255,.15);
    color:#fff;
    border:none;
    width:40px;
    height:40px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
    line-height:1;
  }
  .lightbox-close:hover{background:rgba(255,255,255,.3);}
</style>
</head>
<body>

<header>
  <h1>โหวตแบบเสื้อ 🎽</h1>
  <p>เลือกแบบเสื้อที่คุณชอบที่สุด — 1 คน เลือกได้ 1 แบบ</p>
</header>

<div class="winner-banner" id="winnerBanner">กำลังโหลดผลโหวต...</div>
<div class="status" id="statusLine"></div>

<div class="grid" id="grid"></div>

<div class="reset-wrap">
  <button class="reset-btn" id="resetBtn">รีเซ็ตคะแนนทั้งหมด</button>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">&times;</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
/* ====== ตั้งค่า ====== */
// วาง URL ของ Google Apps Script Web App ที่ deploy แล้วตรงนี้
// ถ้าเว้นว่างไว้ ระบบจะเก็บคะแนนในเครื่องนี้เท่านั้น (localStorage)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpG7b_pP5yjUUCfK88gcsMe9nC921aE-_0KOypLRC-EzsOD9hMF4LHzrdbRS1i-CXc/exec";

// ชื่อแบบเสื้อแต่ละแบบ (เปลี่ยนได้ตามต้องการ)
const DESIGNS = [
  { id: 1,  name: "แบบที่ 1",  img: "images/1.jpg" },
  { id: 2,  name: "แบบที่ 2",  img: "images/2.jpg" },
  { id: 3,  name: "แบบที่ 3",  img: "images/3.jpg" },
  { id: 4,  name: "แบบที่ 4",  img: "images/4.jpg" },
  { id: 5,  name: "แบบที่ 5",  img: "images/5.jpg" },
  { id: 6,  name: "แบบที่ 6",  img: "images/6.jpg" },
  { id: 7,  name: "แบบที่ 7",  img: "images/7.jpg" },
  { id: 8,  name: "แบบที่ 8",  img: "images/8.jpg" },
  { id: 9,  name: "แบบที่ 9",  img: "images/9.jpg" },
  { id: 10, name: "แบบที่ 10", img: "images/10.jpg" },
  { id: 11, name: "แบบที่ 11", img: "images/11.jpg" },
  { id: 12, name: "แบบที่ 12", img: "images/12.jpg" },
];
/* ===================== */

const VOTED_KEY = "shirt_vote_choice";
const LOCAL_VOTES_KEY = "shirt_vote_counts";
const grid = document.getElementById("grid");
const winnerBanner = document.getElementById("winnerBanner");
const statusLine = document.getElementById("statusLine");
const resetBtn = document.getElementById("resetBtn");

let votes = {};      // { id: count }
let myVote = localStorage.getItem(VOTED_KEY); // id ที่เคยโหวต (string) หรือ null
let refreshTimer = null;

// ---------- Render ----------
function render() {
  const total = Object.values(votes).reduce((a, b) => a + b, 0);
  const maxVotes = Math.max(0, ...Object.values(votes));

  grid.innerHTML = "";
  DESIGNS.forEach(d => {
    const count = votes[d.id] || 0;
    const pct = total > 0 ? ((count / total) * 100) : 0;
    const isLeading = maxVotes > 0 && count === maxVotes;
    const isMine = String(myVote) === String(d.id);

    const card = document.createElement("div");
    card.className = "card" + (isLeading ? " leading" : "");

    card.innerHTML = `
      ${isLeading ? '<div class="crown">🏆 ผู้นำ</div>' : ""}
      <div class="img-wrap" data-img="${d.img}" data-name="${d.name}"><img src="${d.img}" alt="${d.name}" loading="lazy"></div>
      <div class="card-body">
        <h3>${d.name}</h3>
        <button class="vote-btn ${isMine ? "voted" : ""}" data-id="${d.id}" ${myVote ? "disabled" : ""}>
          ${isMine ? "✓ คุณเลือกแบบนี้" : "โหวตแบบนี้"}
        </button>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="stats">
          <span>${count} โหวต</span>
          <span>${pct.toFixed(1)}%</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  // ปุ่มโหวต
  grid.querySelectorAll(".vote-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (myVote) return;
      castVote(btn.dataset.id);
    });
  });

  // คลิกรูปเพื่อซูม
  grid.querySelectorAll(".img-wrap").forEach(el => {
    el.addEventListener("click", () => {
      openLightbox(el.dataset.img, el.dataset.name);
    });
  });

  // Winner banner
  if (total === 0) {
    winnerBanner.innerHTML = "ยังไม่มีการโหวต — เป็นคนแรกที่โหวตเลย!";
  } else {
    const winners = DESIGNS.filter(d => (votes[d.id] || 0) === maxVotes);
    const names = winners.map(w => w.name).join(", ");
    winnerBanner.innerHTML = winners.length > 1
      ? `ขณะนี้เสมอกันที่อันดับ 1: <span>${names}</span> (${maxVotes} โหวต)`
      : `แบบที่ได้รับความนิยมสูงสุด: <span>${names}</span> (${maxVotes} โหวต จาก ${total} โหวต)`;
  }

  statusLine.textContent = APPS_SCRIPT_URL
    ? "ผลโหวตแบบเรียลไทม์ (อัปเดตอัตโนมัติทุก 5 วินาที)"
    : "หมายเหตุ: ยังไม่ได้เชื่อมต่อฐานข้อมูลกลาง คะแนนนี้ถูกเก็บไว้ในเครื่องนี้เท่านั้น";
}

// ---------- Data: load ----------
async function loadVotes() {
  if (APPS_SCRIPT_URL) {
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=results`);
      const data = await res.json();
      votes = data.votes || {};
    } catch (e) {
      console.error("โหลดผลโหวตไม่สำเร็จ", e);
      loadLocalVotes();
    }
  } else {
    loadLocalVotes();
  }
  render();
}

function loadLocalVotes() {
  votes = JSON.parse(localStorage.getItem(LOCAL_VOTES_KEY) || "{}");
}

function saveLocalVotes() {
  localStorage.setItem(LOCAL_VOTES_KEY, JSON.stringify(votes));
}

// ---------- Data: vote ----------
async function castVote(id) {
  myVote = id;
  localStorage.setItem(VOTED_KEY, id);

  // อัปเดต UI ทันที (optimistic)
  votes[id] = (votes[id] || 0) + 1;
  saveLocalVotes();
  render();

  if (APPS_SCRIPT_URL) {
    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "vote", id: id })
      });
      const data = await res.json();
      if (data.votes) {
        votes = data.votes;
        render();
      }
    } catch (e) {
      console.error("ส่งผลโหวตไม่สำเร็จ", e);
    }
  }
}

// ---------- Reset ----------
resetBtn.addEventListener("click", async () => {
  if (!confirm("ต้องการรีเซ็ตคะแนนทั้งหมดหรือไม่?")) return;

  localStorage.removeItem(VOTED_KEY);
  localStorage.removeItem(LOCAL_VOTES_KEY);
  myVote = null;
  votes = {};

  if (APPS_SCRIPT_URL) {
    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "reset" })
      });
      const data = await res.json();
      votes = data.votes || {};
    } catch (e) {
      console.error("รีเซ็ตไม่สำเร็จ", e);
    }
  }
  render();
});

// ---------- Lightbox ----------
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");
const lightboxCaption = document.getElementById("lightboxCaption");
const lightboxClose = document.getElementById("lightboxClose");

function openLightbox(src, name) {
  lightboxImg.src = src;
  lightboxImg.alt = name;
  lightboxCaption.textContent = name;
  lightbox.classList.add("open");
}
function closeLightbox() {
  lightbox.classList.remove("open");
  lightboxImg.src = "";
}
lightboxClose.addEventListener("click", closeLightbox);
lightbox.addEventListener("click", (e) => {
  if (e.target === lightbox) closeLightbox();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeLightbox();
});

// ---------- Auto refresh ----------
function startAutoRefresh() {
  if (!APPS_SCRIPT_URL) return;
  refreshTimer = setInterval(loadVotes, 5000);
}

loadVotes();
startAutoRefresh();
</script>
</body>
</html>
